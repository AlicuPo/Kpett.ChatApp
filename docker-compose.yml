services:
  api:
    image: kpett-chatapp-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION:-Release}
    restart: unless-stopped
    ports:
      - "${API_HTTP_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"

      ConnectionStrings__KpettChatAppDb: "${ConnectionStrings__KpettChatAppDb:?Set ConnectionStrings__KpettChatAppDb in Portainer stack variables}"
      ConnectionStrings__Redis: "${ConnectionStrings__Redis:?Set ConnectionStrings__Redis in Portainer stack variables}"

      JwtSection__KeyAccess: "${JwtSection__KeyAccess:?Set JwtSection__KeyAccess in Portainer stack variables}"
      JwtSection__KeyRefres: "${JwtSection__KeyRefres:?Set JwtSection__KeyRefres in Portainer stack variables}"
      JwtSection__Issuer: "${JwtSection__Issuer:-kpett.chatApp}"
      JwtSection__Audience: "${JwtSection__Audience:-kpett.chatApp}"
      JwtSection__AccessTokenExpireMinutes: "${JwtSection__AccessTokenExpireMinutes:-5}"
      JwtSection__RefreshTokenExpireDays: "${JwtSection__RefreshTokenExpireDays:-365}"

      Cors__AllowedOrigins__0: "${Cors__AllowedOrigins__0:?Set Cors__AllowedOrigins__0 in Portainer stack variables}"
      AllowedHosts: "*"

      CloudinarySettings__CloudName: "${CloudinarySettings__CloudName:?Set CloudinarySettings__CloudName in Portainer stack variables}"
      CloudinarySettings__ApiKey: "${CloudinarySettings__ApiKey:?Set CloudinarySettings__ApiKey in Portainer stack variables}"
      CloudinarySettings__ApiSecret: "${CloudinarySettings__ApiSecret:?Set CloudinarySettings__ApiSecret in Portainer stack variables}"
      CloudinarySettings__NotificationUrl: "${CloudinarySettings__NotificationUrl:-}"

      EmailSettings__SmtpHost: "${EmailSettings__SmtpHost:-smtp.gmail.com}"
      EmailSettings__SmtpPort: "${EmailSettings__SmtpPort:-587}"
      EmailSettings__EnableSsl: "${EmailSettings__EnableSsl:-true}"
      EmailSettings__SmtpUsername: "${EmailSettings__SmtpUsername:?Set EmailSettings__SmtpUsername in Portainer stack variables}"
      EmailSettings__SmtpPassword: "${EmailSettings__SmtpPassword:?Set EmailSettings__SmtpPassword in Portainer stack variables}"
      EmailSettings__FromEmail: "${EmailSettings__FromEmail:?Set EmailSettings__FromEmail in Portainer stack variables}"
      EmailSettings__FromName: "${EmailSettings__FromName:-Kpett.ChatApp}"
      EmailSettings__PasswordResetOtpExpiryMinutes: "${EmailSettings__PasswordResetOtpExpiryMinutes:-10}"
      EmailSettings__PasswordResetOtpLength: "${EmailSettings__PasswordResetOtpLength:-6}"

      MediaSettings__MaxImageSizeBytes: "${MediaSettings__MaxImageSizeBytes:-5242880}"
      MediaSettings__MaxVideoSizeBytes: "${MediaSettings__MaxVideoSizeBytes:-52428800}"
      MediaSettings__AllowedImageExtensions__0: .jpg
      MediaSettings__AllowedImageExtensions__1: .jpeg
      MediaSettings__AllowedImageExtensions__2: .png
      MediaSettings__AllowedImageExtensions__3: .webp
      MediaSettings__AllowedImageExtensions__4: .gif
      MediaSettings__AllowedVideoExtensions__0: .mp4
      MediaSettings__AllowedVideoExtensions__1: .mov
      MediaSettings__AllowedVideoExtensions__2: .avi
    volumes:
      - api_logs:/app/Logs
    networks:
      - kpett

volumes:
  api_logs:

networks:
  kpett:
    driver: bridge
