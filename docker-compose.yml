services:
  api:
    image: kpett-chatapp-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION:-Release}
    restart: unless-stopped
    ports:
      - "${API_HTTP_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"

      ConnectionStrings__KpettChatAppDb: "${ConnectionStrings__KpettChatAppDb}"
      ConnectionStrings__Redis: "${ConnectionStrings__Redis}"

      JwtSection__KeyAccess: "${JwtSection__KeyAccess}"
      JwtSection__KeyRefres: "${JwtSection__KeyRefres}"
      JwtSection__Issuer: "${JwtSection__Issuer:-kpett.chatApp}"
      JwtSection__Audience: "${JwtSection__Audience:-kpett.chatApp}"
      JwtSection__AccessTokenExpireMinutes: "${JwtSection__AccessTokenExpireMinutes:-5}"
      JwtSection__RefreshTokenExpireDays: "${JwtSection__RefreshTokenExpireDays:-365}"

      Cors__AllowedOrigins__0: "${Cors__AllowedOrigins__0}"
      AllowedHosts: "*"

      CloudinarySettings__CloudName: "${CloudinarySettings__CloudName}"
      CloudinarySettings__ApiKey: "${CloudinarySettings__ApiKey}"
      CloudinarySettings__ApiSecret: "${CloudinarySettings__ApiSecret}"
      CloudinarySettings__NotificationUrl: "${CloudinarySettings__NotificationUrl:-}"

      EmailSettings__SmtpHost: "${EmailSettings__SmtpHost:-smtp.gmail.com}"
      EmailSettings__SmtpPort: "${EmailSettings__SmtpPort:-587}"
      EmailSettings__EnableSsl: "${EmailSettings__EnableSsl:-true}"
      EmailSettings__SmtpUsername: "${EmailSettings__SmtpUsername}"
      EmailSettings__SmtpPassword: "${EmailSettings__SmtpPassword}"
      EmailSettings__FromEmail: "${EmailSettings__FromEmail}"
      EmailSettings__FromName: "${EmailSettings__FromName:-Kpett.ChatApp}"
      EmailSettings__PasswordResetOtpExpiryMinutes: "${EmailSettings__PasswordResetOtpExpiryMinutes:-10}"
      EmailSettings__PasswordResetOtpLength: "${EmailSettings__PasswordResetOtpLength:-6}"

      MediaSettings__MaxImageSizeBytes: "${MediaSettings__MaxImageSizeBytes:-5242880}"
      MediaSettings__MaxVideoSizeBytes: "${MediaSettings__MaxVideoSizeBytes:-52428800}"
      MediaSettings__AllowedImageExtensions__0: .jpg
      MediaSettings__AllowedImageExtensions__1: .jpeg
      MediaSettings__AllowedImageExtensions__2: .png
      MediaSettings__AllowedImageExtensions__3: .webp
      MediaSettings__AllowedImageExtensions__4: .gif
      MediaSettings__AllowedVideoExtensions__0: .mp4
      MediaSettings__AllowedVideoExtensions__1: .mov
      MediaSettings__AllowedVideoExtensions__2: .avi
    volumes:
      - api_logs:/app/Logs
    networks:
      - kpett

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: kppett-chatapp-db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "${MSSQL_PID:-Express}"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_DATABASE: "${MSSQL_DATABASE}"
    ports:
      - "${MSSQL_HOST_PORT:-1433}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P kpett@123 -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kpett
   
volumes:
  api_logs:
  mssql_data:

networks:
  kpett:
    driver: bridge
